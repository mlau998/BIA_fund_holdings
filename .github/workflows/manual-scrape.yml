name: Manual Holdings Scrape

on:
  workflow_dispatch:
    inputs:
      funds:
        description: 'Comma-separated fund tickers to scrape (leave empty for all)'
        required: false
        default: ''

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run scrapers
        run: python scrapers/run_all.py

      - name: Commit new snapshots
        run: |
          git config user.name "BIA Bot"
          git config user.email "bot@bia.local"
          git add data/snapshots/
          git diff --staged --quiet || git commit -m "chore: manual snapshot $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
